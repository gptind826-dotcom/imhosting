<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>MAFU Host — Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0b14;
            color: #e0dde8;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: #15101e;
            padding: 40px 30px;
            border-radius: 8px;
            border: 1px solid #2e2a3a;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #f0eaff;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .sub {
            color: #b9b0c9;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #c9c0d9;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1e1826;
            border: 1px solid #3c324a;
            border-radius: 6px;
            color: #f0eaff;
            font-size: 15px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #b386d9;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #9b59b6;
            color: #0d0b14;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #af7ac5;
        }
        .footer-link {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #b9b0c9;
        }
        .footer-link a {
            color: #d4b3e6;
            text-decoration: none;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Sign in to MAFUU Host</h2>
        <div class="sub">Access your dashboard</div>
        <form id="loginForm">
            <div class="input-group">
                <label>Email or Username</label>
                <input type="text" name="email" placeholder="your@email.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Log In</button>
        </form>
        <div class="footer-link">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            try {
                const res = await fetch('/login', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.status === 200) {
                    Swal.fire({ icon: 'success', title: 'Logged in', text: 'Redirecting...', timer: 1500, showConfirmButton: false });
                    setTimeout(() => window.location.href = data.url, 1500);
                } else {
                    Swal.fire({ icon: 'error', title: 'Login failed', text: data.msg || 'Invalid credentials' });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Network error' });
            }
        });
    </script>
</body>
</html>
