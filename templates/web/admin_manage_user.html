<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFU Host — Manage Servers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0d0b14; color:#f0eaff; font-family:Arial,Helvetica,sans-serif; padding:20px; }
        .container { max-width:800px; margin:0 auto; }
        .back-btn { background:#1e1826; border:1px solid #3c324a; color:#f0eaff; padding:8px 16px; border-radius:6px; cursor:pointer; margin-bottom:25px; transition:background .2s; }
        .back-btn:hover { background:#2c2338; }
        .user-header { text-align:center; margin-bottom:30px; }
        .user-header h2 { color:#f0eaff; margin-bottom:4px; }
        .user-header p { color:#a89bb8; font-size:14px; }
        .server-card { background:#15101e; border:1px solid #2e2a3a; padding:18px; margin-bottom:15px; border-radius:6px; }
        .server-card strong { color:#f0eaff; }
        .server-card small { color:#a89bb8; margin-left:8px; }
        .status-badge { font-size:12px; padding:2px 8px; border-radius:10px; }
        .status-online { color:#4caf50; }
        .status-offline { color:#f44336; }
        .btn { padding:7px 13px; border-radius:4px; cursor:pointer; font-size:13px; margin-right:5px; margin-top:8px; transition:background .2s; }
        .btn-default { background:#1e1826; color:#f0eaff; border:1px solid #3c324a; }
        .btn-default:hover { background:#2c2338; }
        .btn-success { background:#2e7d32; color:#f0eaff; border:none; }
        .btn-success:hover { background:#3c9a40; }
        .btn-warn { background:transparent; color:#ffb74d; border:1px solid #5a4a2e; }
        .btn-warn:hover { background:#2c2338; }
        .btn-danger-outline { background:transparent; color:#ff6b6b; border:1px solid #4a2e3a; }
        .btn-danger-outline:hover { background:#2c2338; }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="location.href='/admin/panel'"><i class="fas fa-arrow-left"></i> Back to Panel</button>
    <div class="user-header">
        <h2>{{ user.fname }}</h2>
        <p>{{ user.email }}</p>
    </div>
    <div id="serverList">
        {% for s in servers %}
        <div class="server-card">
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                <div>
                    <strong>{{ s.name }}</strong><small>{{ s.folder }}</small>
                    <div style="margin-top:6px;">
                        <span class="status-badge">{{ s.status }}</span>
                        <span style="margin-left:10px;font-size:13px;" class="{{ 'status-online' if s.online else 'status-offline' }}">
                            {{ '🟢 ONLINE' if s.online else '🔴 OFFLINE' }}
                        </span>
                    </div>
                </div>
                <div style="display:flex;flex-wrap:wrap;align-items:flex-start;">
                    <button class="btn btn-default" onclick="location.href='/admin/login-as/{{ user.id }}'"><i class="fas fa-sign-in-alt"></i> Access</button>
                    <button class="btn btn-default" onclick="location.href='/admin/files/{{ s.folder }}'"><i class="fas fa-folder"></i> Files</button>
                    {% if s.status == 'suspended' %}
                    <button class="btn btn-success" onclick="toggleSuspend('{{ s.id }}','active')"><i class="fas fa-check"></i> Unsuspend</button>
                    {% else %}
                    <button class="btn btn-warn" onclick="toggleSuspend('{{ s.id }}','suspended')"><i class="fas fa-pause"></i> Suspend</button>
                    {% endif %}
                    <button class="btn btn-danger-outline" onclick="deleteServer('{{ s.id }}')"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<script>
    async function toggleSuspend(id, status) {
        await fetch(`/admin/suspend-server/${id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status }) });
        location.reload();
    }
    async function deleteServer(id) {
        const c = await Swal.fire({ title:'Delete server?', icon:'warning', background:'#15101e', color:'#f0eaff', showCancelButton:true, confirmButtonColor:'#c62828' });
        if (c.isConfirmed) {
            await fetch(`/admin/delete-server/${id}`, { method:'POST' });
            location.reload();
        }
    }
</script>
</body>
</html>
