<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFUHost — Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0b0b0b;
            color: #e0e0e0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .admin-box {
            background: #121212;
            padding: 40px 30px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            width: 100%;
            max-width: 380px;
        }
        h2 {
            color: #fff;
            margin-bottom: 25px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4a9eff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="admin-box">
    <h2><i class="fas fa-lock"></i> Admin Access</h2>
    <form id="adminLoginForm">
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit">Sign In</button>
    </form>
    <div class="note">Developer: MAFUU<br>@mahfuj_offcial_143</div>
</div>
<script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const res = await fetch('/admin-login', { method: 'POST', body: formData });
        if (res.redirected) {
            window.location.href = res.url;
        } else {
            Swal.fire({ icon: 'error', title: 'Invalid credentials' });
        }
    });
</script>
</body>
</html>
